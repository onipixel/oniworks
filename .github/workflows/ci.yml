name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go build, vet & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: oniworks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ONIWORKS_TEST_DSN: postgres://postgres:password@127.0.0.1:5432/oniworks_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./framework/... ./cmd/... ./stubs/... ./examples/...

      - name: Vet
        run: go vet ./framework/... ./cmd/... ./stubs/...

      - name: Unit tests (with race detector)
        run: go test -race ./framework/... ./stubs/... ./cmd/...

      - name: PostgreSQL integration tests
        run: go test ./framework/database/ ./framework/migrations/ -run 'Integration|MigrateBatch' -v

  client:
    name: OniSocket TS client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
